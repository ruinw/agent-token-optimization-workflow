<svg width="1600" height="500" viewBox="0 0 1600 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent Token Optimization Workflow Banner</title>
  <desc id="desc">Open-source style banner for the Agent Token Optimization Workflow repository.</desc>
  <defs>
